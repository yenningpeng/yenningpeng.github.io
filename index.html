<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Yen Ning Peng — Collection</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="root"></div>

  <script>
  /* ============================================================
     Yen Ning Peng — Portfolio
     Vanilla JS, hash-routed single page. No build step.
     Asset paths follow ASSETS.md exactly (nested folders).
     ============================================================ */

  // ---- Asset references (edit these to point at your real images) ----
  // Hero stack uses the four Hero Images in order.
  const HERO = [
    "assets/Hero Images/Heroimages01.jpg",
    "assets/Hero Images/Heroimages02.jpg",
    "assets/Hero Images/Heroimages03.jpg",
    "assets/Hero Images/Heroimages04.jpg",
  ];

  // ---- Page data (prototype placeholder content) ----
  const PAGES = {
    graphic: {
      title: "Graphic Design",
      cards: [
        { title: "LOGO & NAMECARD", body: "滾滾長江東逝水，浪花淘盡英雄。", image: "assets/Graphic/Digital Painting/DigitalPainting01.png" },
        { title: "POSTER",          body: "是非成敗轉頭空。",                 image: "assets/Graphic/Poster/Poster01.png" },
        { title: "BANNER",          body: "青山依舊在，幾度夕陽紅。",         image: "assets/Graphic/Marker Pen Painting/MarkerPen01.png" },
        { title: "SHOP POST",       body: "滾滾長江東逝水。",                 image: "assets/Graphic/UI Design/UI01.png" },
      ],
    },
    "3d": {
      title: "3D Design",
      cards: [
        { title: "Rendering",         body: "滾滾長江東逝水，浪花淘盡英雄。", image: "assets/3D Design/Speedform/Speedform01.png" },
        { title: "Bionics Chair",     body: "是非成敗轉頭空。",                 image: "assets/3D Design/Bio-function Chair/Bio-function Chair01.png" },
        { title: "Cafe Racer Bike",   body: "青山依舊在，幾度夕陽紅。",         image: "assets/3D Design/Steampunk Cafe Racer/Steampunk Cafe Racer01.jpg" },
        { title: "Feng-Shui Lantern", body: "滾滾長江東逝水。",                 image: "assets/3D Design/FengShui Lamp/FengShui_Lamp01.png" },
      ],
    },
    // Artwork shows the source's empty state. To turn it into a grid,
    // replace `empty: true` with a `cards: [...]` array like the others.
    artwork: {
      title: "Artwork",
      cards: [
        { title: "LOGO & NAMECARD", body: "滾滾長江東逝水，浪花淘盡英雄。", image: "assets/Graphic/Digital Painting/DigitalPainting01.png" },
        { title: "POSTER",          body: "是非成敗轉頭空。",                 image: "assets/Graphic/Poster/Poster01.png" },
        { title: "BANNER",          body: "青山依舊在，幾度夕陽紅。",         image: "assets/Graphic/Marker Pen Painting/MarkerPen01.png" },
        { title: "SHOP POST",       body: "滾滾長江東逝水。",                 image: "assets/Graphic/UI Design/UI01.png" },
      ],
    },
    about: {
      title: "About",
      about: true,
    },
  };

  const NAV = [
    { id: "graphic", label: "Graphic Design" },
    { id: "3d",      label: "3D Design" },
    { id: "artwork", label: "Artwork" },
    { id: "about",   label: "About" },
  ];

  const FOOTER = "2026 Yen Ning Peng All rights reserved.";

  // ---- Tiny DOM helper ----
  function el(tag, attrs, children) {
    const node = document.createElement(tag);
    if (attrs) for (const k in attrs) {
      if (k === "style") node.setAttribute("style", attrs[k]);
      else if (k === "class") node.className = attrs[k];
      else if (k.startsWith("on") && typeof attrs[k] === "function") node.addEventListener(k.slice(2).toLowerCase(), attrs[k]);
      else if (attrs[k] != null) node.setAttribute(k, attrs[k]);
    }
    (children || []).forEach(c => {
      if (c == null) return;
      node.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
    });
    return node;
  }

  function bgImage(path) {
    // encodeURI handles spaces in nested folder/file names from ASSETS.md
    return path ? `background-image:url("${encodeURI(path)}")` : "";
  }

  // ---- Components ----
  function Card(card, onOpen) {
    return el("div", { class: "ynp-card", role: "button", tabindex: "0",
      onClick: () => onOpen(card),
      onKeydown: (e) => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); onOpen(card); } },
    }, [
      el("div", { class: "ynp-card__media" }, [
        el("div", { class: "ynp-card__image", style: bgImage(card.image) }),
      ]),
      el("div", { class: "ynp-card__body" }, [
        el("div", { class: "ynp-card__title" }, [card.title || "標題"]),
        el("div", { class: "ynp-card__desc" }, [card.body || "滾滾長江東逝水，浪花淘盡英雄。是非成敗轉頭空，青山依舊在，幾度夕陽紅。"]),
      ]),
    ]);
  }

  function Home() {
    return el("div", { class: "ynp-home" }, [
      el("div", { class: "ynp-home__hero" }, [
        (() => { const h = el("h1", { class: "ynp-home__title" }); h.innerHTML = "YEN NING PENG<br>COLLECTION"; return h; })(),
      ]),
      el("div", { class: "ynp-home__stack" }, HERO.map(src =>
        el("div", { class: "ynp-home__stack-img", style: bgImage(src) })
      )),
    ]);
  }

  function ListPage(page, onOpen) {
    return el("div", { class: "ynp-list" }, [
      el("h2", { class: "ynp-list__title" }, [page.title]),
      el("div", { class: "ynp-list__grid" }, page.cards.map(c => Card(c, onOpen))),
    ]);
  }

  function EmptyPage() {
    const t = el("div", { class: "ynp-empty__title" });
    t.innerHTML = "Sorry :(<br>There is something went wrong.";
    return el("div", { class: "ynp-empty" }, [t]);
  }

  function AboutPage() {
    return el("div", { class: "ynp-list" }, [
      el("h2", { class: "ynp-list__title" }, ["About"]),
      el("p", { class: "ynp-about__lede" }, [
        "Yen Ning Peng — designer working across graphic design, 3D, and artwork. Based in Taipei. Most projects are quiet object studies and editorial systems.",
      ]),
      el("p", { class: "ynp-about__lede", style: "margin-top:18px;opacity:0.7" }, [
        "Contact — yen.ning.peng@example.com",
      ]),
    ]);
  }

  function DetailOverlay(card, onClose) {
    const overlay = el("div", { class: "ynp-detail", onClick: onClose }, [
      el("div", { class: "ynp-detail__inner", onClick: (e) => e.stopPropagation() }, [
        el("div", { class: "ynp-detail__image", style: bgImage(card.image) }),
        el("div", { class: "ynp-detail__body" }, [
          el("div", { class: "ynp-detail__title" }, [card.title]),
          el("div", { class: "ynp-detail__desc" }, [card.body]),
          el("button", { class: "ynp-detail__close", onClick: onClose }, ["Close"]),
        ]),
      ]),
    ]);
    return overlay;
  }

  function Bar(activeId) {
    return el("nav", { class: "ynp-bar" }, NAV.map(it =>
      el("button", {
        class: "ynp-bar__item" + (activeId === it.id ? " is-active" : ""),
        onClick: () => { location.hash = (it.id === activeId ? "" : "#/" + it.id); },
      }, [it.label])
    ));
  }

  // ---- Router / render ----
  const root = document.getElementById("root");

  function currentRoute() {
    const h = location.hash.replace(/^#\/?/, "");
    return PAGES[h] ? h : "home";
  }

  function openDetail(card) {
    const ov = DetailOverlay(card, closeDetail);
    ov.id = "ynp-overlay";
    document.body.appendChild(ov);
    document.addEventListener("keydown", escClose);
  }
  function closeDetail() {
    const ov = document.getElementById("ynp-overlay");
    if (ov) ov.remove();
    document.removeEventListener("keydown", escClose);
  }
  function escClose(e) { if (e.key === "Escape") closeDetail(); }

  function render() {
    closeDetail();
    const route = currentRoute();
    let content;
    if (route === "home") content = Home();
    else {
      const page = PAGES[route];
      if (page.about) content = AboutPage();
      else if (page.empty) content = EmptyPage();
      else content = ListPage(page, openDetail);
    }

    const sheet = el("div", { class: "ynp-stage" }, [
      el("div", { class: "ynp-sheet" }, [
        el("div", { class: "ynp-sheet__content" }, [content]),
        el("div", { class: "ynp-sheet__footnote" }, [FOOTER]),
        el("div", { class: "ynp-sheet__bar" }, [Bar(route === "home" ? null : route)]),
      ]),
    ]);

    root.replaceChildren(sheet);
    window.scrollTo(0, 0);
  }

  window.addEventListener("hashchange", render);
  render();
  </script>
</body>
</html>
